services:
  timescaledb:
    image: timescale/timescaledb:latest-pg16
    container_name: tv_local_timescaledb
    environment:
      POSTGRES_DB: tradingview_local
      POSTGRES_USER: trader
      POSTGRES_PASSWORD: trader
    ports:
      - "5432:5432"
    volumes:
      - tv_local_pgdata:/var/lib/postgresql/data
      - ../db/sql:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U trader -d tradingview_local"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: tv_local_redis
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - tv_local_redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  tv_local_pgdata:
  tv_local_redis:
